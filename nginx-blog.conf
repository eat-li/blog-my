# 博客 Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/blog
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/blog /etc/nginx/sites-enabled/
# 最后重载: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    # 无域名时使用默认 server，有域名后改为你的域名
    server_name _;

    # 前端静态文件
    root /var/www/blog/client/dist;
    index index.html;

    # 日志
    access_log /var/log/nginx/blog-access.log;
    error_log /var/log/nginx/blog-error.log;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # 静态资源缓存（带 hash 的文件名可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（富文本编辑器可能上传大内容）
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 50m;
    }

    # SPA 路由回退 — 所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
