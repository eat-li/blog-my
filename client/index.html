<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="EatLi 的个人博客 — 记录技术、动漫与 Galgame 的点点滴滴" />
  <title>EatLi · blog</title>

  <!-- 使用系统字体栈，不依赖外部字体文件（国内 Google Fonts 不可达） -->
  <!-- 预解析 OSS 域名，加速头像/图片加载 -->
  <link rel="dns-prefetch" href="https://blog-saki.oss-cn-chengdu.aliyuncs.com" />
</head>

<body>
  <!-- 防止主题闪烁：在 Vue 挂载前读取 localStorage -->
  <script>
    (function() {
      var t = localStorage.getItem('theme')
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark')
      }
    })()
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
